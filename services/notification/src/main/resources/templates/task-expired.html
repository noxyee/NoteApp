<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Expired Notification</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #007bff;
            color: #ffffff;
            padding: 10px;
            text-align: center;
        }
        .content {
            margin: 20px 0;
        }
        .footer {
            text-align: center;
            color: #777777;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Task Expired Notification</h1>
    </div>
    <div class="content">
        <p>Dear <strong><span th:text="${userName}"></span></strong>,</p>
        <p>The following task has expired:</p>
        <p><strong>Title:</strong> <span th:text="${title}"></span></p>
        <p><strong>Due Date:</strong> <span th:text="${dueDate}""></span></p>
    </div>
    <div class="footer">
        <p>&copy; 2025 Note App. All rights reserved.</p>
    </div>
</div>
</body>
</html>
