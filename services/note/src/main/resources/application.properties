spring.application.name=note
spring.config.import=optional:configserver:http://localhost:8888/
spring.profiles.active=dev

#mongock
mongock.migration-scan-package=com.noxyee.note.migration
mongock.enabled=true
mongock.transactionEnabled=false
mongock.runner-type=InitializingBean
mongock.track-ignored=false

#kafka
spring.kafka.consumer.group-id=note
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

#kafka topics
kafka.topic.tag-delete=tag-delete