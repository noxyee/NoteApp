<div class="relative h-full rounded-lg bg-white p-6 shadow-xl ring-1 ring-slate-900/5 flex flex-col gap-2">
  <div class="absolute top-0 right-0 py-2 px-4 rounded-bl-xl rounded-tr-lg hover:bg-slate-50"
       (click)="navigateToNote(note())">
    <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 3">
      <path
        d="M2 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Zm6.041 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3ZM14 0a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Z"/>
    </svg>
  </div>
  <h1 class="font-medium tracking-tight select-none">
    {{ note().title }}
  </h1>
  <p class="select-none text-sm break-all text-slate-500">
    {{ note().content | slice:0:500 }}
    @if (note()!.content!.length > 100) {
      <span>...</span>
    }
  </p>
  <div class="flex flex-row justify-between mt-auto">
    <div class="col-span-7 flex flex-wrap gap-1">
      @for (tag of tags(); track tag.id) {
        <app-tag [tag]="tag"/>
      }
    </div>
    <div class="flex justify-end gap-0.5">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"
           class="size-5">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M6 6.878V6a2.25 2.25 0 0 1 2.25-2.25h7.5A2.25 2.25 0 0 1 18 6v.878m-12 0c.235-.083.487-.128.75-.128h10.5c.263 0 .515.045.75.128m-12 0A2.25 2.25 0 0 0 4.5 9v.878m13.5-3A2.25 2.25 0 0 1 19.5 9v.878m0 0a2.246 2.246 0 0 0-.75-.128H5.25c-.263 0-.515.045-.75.128m15 0A2.25 2.25 0 0 1 21 12v6a2.25 2.25 0 0 1-2.25 2.25H5.25A2.25 2.25 0 0 1 3 18v-6c0-.98.626-1.813 1.5-2.122"/>
      </svg>
      <p class="select-none text-sm">
        {{ note().taskIds?.length }}
      </p>
    </div>
  </div>
</div>
